<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="satana.css">
    <title>МойСайт</title>

<body>
    <header class="header">
<div class="header__container">
            <div class="header__logo">МойСайт</div>
            <img src="background/pdtplf(1).png" alt="Header Image" class="header__image">

    <main class="hero">
        <video autoplay muted loop playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;">

    <section class="features" id="features">

                <div class="feature-card">
                    <h3 class="feature-card__title">Масштабируемый</h3>

                </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer block -->
    <footer class="footer" id="contact">
        <div class="footer__container">
            <p class="footer__text">&copy; 2026 МойСайт. Создан с BEM.</p>
        </div>
